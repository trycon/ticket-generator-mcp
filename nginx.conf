upstream ticket_generator_mcp {
    # Point to your Fargate service
    # This will be configured in your actual nginx deployment
    server localhost:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/ticket-generator-access.log;
    error_log /var/log/nginx/ticket-generator-error.log;

    # Health check endpoint
    location /health {
        proxy_pass http://ticket_generator_mcp/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # MCP endpoint
    location /mcp {
        proxy_pass http://ticket_generator_mcp/mcp;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # MCP-specific headers
        proxy_set_header mcp-session-id $http_mcp_session_id;
        proxy_set_header Authorization $http_authorization;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_cache off;
        
        # Support for SSE/streaming
        proxy_set_header Accept "text/event-stream";
        chunked_transfer_encoding on;
    }

    # Root path redirect or info
    location / {
        return 200 '{"service":"Ticket Generator MCP","status":"running","endpoints":["/health","/mcp"]}';
        add_header Content-Type application/json;
    }
}

# HTTPS version (recommended for production)
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # Replace with your domain

    # SSL certificates (use Let's Encrypt or AWS Certificate Manager)
    # ssl_certificate /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
