        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_cache off;
        
        # Support for SSE/streaming
        proxy_set_header Accept "text/event-stream";
        chunked_transfer_encoding on;
    }

    # Root path redirect or info
